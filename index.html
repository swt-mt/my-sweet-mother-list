<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>半糖孕册</title>
  <style>
    :root {
      --ink: #27302c;
      --muted: #617168;
      --paper: #fffaf1;
      --panel: rgba(255, 253, 248, 0.82);
      --line: #dfd5c3;
      --sage: #5d8f77;
      --rose: #c97766;
      --aqua: #79b9b4;
      --gold: #d9cf8e;
      --shadow: 0 24px 70px rgba(54, 67, 60, 0.16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Han Serif SC", "Microsoft YaHei", serif;
      background:
        linear-gradient(135deg, rgba(121, 185, 180, 0.2), transparent 34%),
        linear-gradient(315deg, rgba(201, 119, 102, 0.16), transparent 42%),
        repeating-linear-gradient(0deg, rgba(93, 143, 119, 0.045) 0 1px, transparent 1px 30px),
        var(--paper);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 26px 0 56px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 60px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      font-weight: 900;
    }

    .mark {
      width: 86px;
      height: 86px;
      filter: drop-shadow(0 10px 18px rgba(65, 95, 75, 0.18));
    }

    .brand-copy {
      display: block;
    }

    .brand-name {
      margin: 0;
      color: var(--ink);
      font-size: clamp(32px, 4.2vw, 58px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand-tagline {
      margin-top: 9px;
      color: var(--sage-dark);
      font-size: 16px;
      font-weight: 800;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid rgba(93, 143, 119, 0.28);
      border-radius: 999px;
      color: var(--sage);
      background: rgba(255, 253, 248, 0.76);
      font-size: 15px;
      font-weight: 900;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 420px);
      gap: 56px;
      align-items: center;
      min-height: calc(100vh - 112px);
      padding: 42px 0 26px;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(34px, 5.1vw, 66px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
    }

    .lead {
      max-width: 720px;
      margin: 24px 0 0;
      color: #4e5d55;
      font-size: clamp(17px, 1.7vw, 22px);
      line-height: 1.78;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 32px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 900;
    }

    .primary {
      color: #fffdf8;
      background: var(--sage);
      box-shadow: 0 16px 32px rgba(93, 143, 119, 0.24);
    }

    .secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.8);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(93, 143, 119, 0.22);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero-card::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.55), transparent 34%),
        linear-gradient(180deg, transparent 0 60%, rgba(93, 143, 119, 0.05) 100%);
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      display: grid;
      gap: 22px;
      padding: 28px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .card-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      font-weight: 900;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      color: #fffdf8;
      background: var(--rose);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .rail {
      display: grid;
      gap: 14px;
      padding-top: 4px;
    }

    .phase {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 14px;
      align-items: start;
      min-height: 72px;
      padding: 16px 0 16px 8px;
      border-top: 1px solid rgba(223, 213, 195, 0.9);
    }

    .phase:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .dot {
      width: 22px;
      height: 22px;
      margin-top: 4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sage), var(--aqua));
      box-shadow: inset 0 0 0 5px rgba(255, 253, 248, 0.82);
    }

    .phase strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
    }

    .phase span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }
    }

    @media (max-width: 620px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding-top: 16px;
      }

      .nav {
        align-items: flex-start;
      }

      .brand span {
        font-size: 21px;
      }

      .hero {
        gap: 28px;
        padding-top: 26px;
      }

    }
  </style>
</head>
<body>
  <main class="shell">
    <nav class="nav" aria-label="半糖孕册导航">
      <a class="brand" href="./index.html" aria-label="半糖孕册首页">
        <svg class="mark" viewBox="0 0 96 96" role="img" aria-label="半糖孕册 logo">
          <defs>
            <linearGradient id="markBg" x1="14" y1="10" x2="84" y2="84" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#fffaf2"/>
              <stop offset="0.55" stop-color="#f4cdb6"/>
              <stop offset="1" stop-color="#a7c8bb"/>
            </linearGradient>
            <linearGradient id="markTone" x1="18" y1="48" x2="80" y2="58" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#eaa38f"/>
              <stop offset="1" stop-color="#5d8f77"/>
            </linearGradient>
          </defs>
          <circle cx="48" cy="48" r="39" fill="url(#markBg)"/>
          <path d="M16 55 C25 41 38 35 50 38 C61 41 71 40 80 34 C79 56 66 72 49 75 C33 77 21 68 16 55 Z" fill="url(#markTone)" opacity="0.92"/>
          <path d="M24 48 C33 40 43 38 52 41 C61 44 69 43 76 38" fill="none" stroke="#fffdf8" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
          <path d="M27 58 C36 54 44 54 51 58 C58 62 66 62 74 58" fill="none" stroke="#fffdf8" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
          <path d="M43 29 C49 25 55 25 60 29 C58 36 54 40 49 42 C45 39 42 34 43 29 Z" fill="#5d8f77"/>
          <path d="M47 31 C40 30 35 25 33 18 C40 18 45 21 47 31 Z" fill="#e1a091"/>
          <path d="M49 31 C54 21 61 17 69 17 C67 25 61 31 49 31 Z" fill="#d9cf8e"/>
          <path d="M48 33 L48 70" fill="none" stroke="#fffdf8" stroke-width="4.5" stroke-linecap="round"/>
        </svg>
        <div class="brand-copy">
          <p class="brand-name">半糖孕册</p>
          <div class="brand-tagline">给妈妈的孕产准备工具</div>
        </div>
      </a>
      <a class="nav-link" href="./pregnancy-mama-checklist.html">打开清单</a>
    </nav>

    <section class="hero" aria-label="半糖孕册品牌介绍">
      <div>
        <h1>孕期、待产、新生儿照顾，一张清单慢慢准备。</h1>
        <p class="lead">半糖孕册把待产准备、产后照护和新生儿用品放在同一个页面里。少一点焦虑囤货，多一点按阶段准备。</p>
        <div class="actions">
          <a class="button primary" href="./pregnancy-mama-checklist.html">进入完整清单</a>
          <a class="button secondary" href="./pregnancy-mama-checklist.html#newborn">先看新生儿用品</a>
        </div>
      </div>

      <aside class="hero-card" aria-label="清单预览">
        <div class="card-inner">
          <div class="card-top">
            <div>
              <span class="badge">品牌导览</span>
            </div>
          </div>
          <div class="rail">
            <div class="phase">
              <span class="dot" aria-hidden="true"></span>
              <div><strong>怀孕</strong><span>把产检、穿着和基础补给先理顺。</span></div>
            </div>
            <div class="phase">
              <span class="dot" aria-hidden="true"></span>
              <div><strong>生产</strong><span>按住院场景准备，临近发动不慌乱。</span></div>
            </div>
            <div class="phase">
              <span class="dot" aria-hidden="true"></span>
              <div><strong>新生儿照顾</strong><span>先顾睡眠、喂养和换尿布这三件事。</span></div>
            </div>
          </div>
        </div>
      </aside>
    </section>

  </main>
</body>
</html>
